<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Hibrid PRO - România</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1d4ed8; --bg: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            --card: #ffffff; --text: #1e293b; --muted: #64748b; --grid: #f8fafc;
            --badge-bg: #dcfce7; --badge-txt: #166534; --shadow: rgba(0,0,0,0.1);
            --info-box: rgba(59, 130, 246, 0.08);
            --source-tag: #94a3b8;
            --toggle-icon: #f59e0b;
        }
        [data-theme="dark"] {
            --primary: #60a5fa; --bg: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --grid: #334155;
            --badge-bg: #064e3b; --badge-txt: #34d399; --shadow: rgba(0,0,0,0.4);
            --info-box: rgba(255, 255, 255, 0.05);
            --toggle-icon: #facc15;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: 0.3s; padding: 20px; }
        .card { background: var(--card); border-radius: 28px; padding: 25px; width: 100%; max-width: 440px; box-shadow: 0 20px 25px -5px var(--shadow); text-align: center; position: relative; }
        
        .theme-toggle { position: absolute; top: 20px; right: 20px; background: var(--grid); border: none; width: 35px; height: 35px; border-radius: 50%; color: var(--toggle-icon); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 20px; margin-top: 10px; }
        .search-box input { flex: 1; padding: 12px 16px; border-radius: 14px; border: 2px solid var(--grid); background: var(--grid); color: var(--text); outline: none; font-weight: 600; font-size: 0.95rem; }
        .search-box input:focus { border-color: var(--primary); }
        .search-box button { background: var(--primary); color: white; border: none; width: 45px; border-radius: 12px; cursor: pointer; }

        .city-name { color: var(--primary); font-size: 1.8rem; font-weight: 800; text-transform: uppercase; margin-top: 10px; }
        .time-sync { font-size: 0.7rem; color: var(--muted); margin-bottom: 15px; }
        .temp-main { font-size: 5rem; font-weight: 800; color: var(--primary); margin: 0; letter-spacing: -3px; }
        .weather-icon { font-size: 5.5rem; margin: 10px 0; height: 110px; display: flex; align-items: center; justify-content: center; }
        .condition-text { font-weight: 700; font-size: 1.2rem; margin-bottom: 20px; text-transform: capitalize; }
        
        .forecast-banner { background: var(--info-box); border-left: 4px solid var(--primary); padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.92rem; text-align: left; line-height: 1.5; }
        
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; text-align: left; background: var(--grid); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .item-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; font-weight: 800; display: block; }
        .item-val { font-weight: 700; font-size: 0.95rem; display: block; margin-top: 2px; }
        .item-src { font-size: 0.55rem; color: var(--source-tag); font-weight: 600; text-transform: uppercase; }
        
        /* Buton Actualizare */
        .btn-update { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 18px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; text-transform: uppercase; }
        .btn-update:active { transform: scale(0.98); opacity: 0.9; }

        .footer-badge { display: inline-block; background: var(--badge-bg); color: var(--badge-txt); border-radius: 8px; padding: 8px 15px; font-size: 0.65rem; font-weight: 700; margin-top: 10px; }
        #loader { padding: 50px; font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="card">
    <button class="theme-toggle" onclick="toggleTheme()" id="t-btn"><i class="fas fa-moon"></i></button>
    
    <div class="search-box">
        <input type="text" id="city-in" placeholder="Ex: Targu Neamt, Sinaia..." onkeypress="if(event.key==='Enter') updateWeather()">
        <button onclick="updateWeather()"><i class="fas fa-search"></i></button>
    </div>

    <div id="loader" style="display:none;"><i class="fas fa-spinner fa-spin fa-3x"></i><br><br>Sincronizare Hub...</div>

    <div id="main-content">
        <div id="city-title" class="city-name">--</div>
        <div id="sync-info" class="time-sync">--</div>
        <div id="big-icon" class="weather-icon"></div>
        <div id="main-temp" class="temp-main">--</div>
        <div id="main-desc" class="condition-text">--</div>

        <div class="forecast-banner" id="smart-text">--</div>
        
        <div class="data-grid" id="full-grid"></div>

        <div class="footer-badge">
            <i class="fas fa-microchip"></i> Hub Hibrid (YO8ACR): ANM + WeatherAPI + Meteoblue
        </div>

        <button class="btn-update" onclick="updateWeather()">
            <i class="fas fa-sync-alt"></i> Actualizează datele
        </button>
    </div>
</div>

<script>
    const W_KEY = "bdffdac051334f298e0175011261604";
    const ANM_PROXY = "https://vremea-tg-neamt.yo8acr.workers.dev/";

    function toggleTheme() {
        const b = document.body;
        const isDark = b.getAttribute('data-theme') === 'dark';
        b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('t-btn').innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
    }

    function timeFmt(s) {
        if(!s) return "--:--";
        let [t, m] = s.split(' ');
        let [h, min] = t.split(':');
        if(m === 'PM' && h !== '12') h = parseInt(h)+12;
        if(m === 'AM' && h === '12') h = '00';
        return `${h.toString().padStart(2,'0')}:${min}`;
    }

    async function updateWeather() {
        const input = document.getElementById('city-in').value.trim() || "Targu Neamt";
        document.getElementById('main-content').style.opacity = "0.3";
        document.getElementById('loader').style.display = "block";

        try {
            const rW = await fetch(`https://api.weatherapi.com/v1/forecast.json?key=${W_KEY}&q=${input}&days=1&aqi=yes&lang=ro`);
            const dW = await rW.json();
            if(dW.error) throw new Error("Not found");

            const cur = dW.current, loc = dW.location, fDay = dW.forecast.forecastday[0];
            const isDay = cur.is_day === 1;

            const rA = await fetch(ANM_PROXY + "?t=" + Date.now());
            const jA = await rA.json();
            const station = jA.features.find(f => 
                f.properties.nume.toUpperCase().includes(loc.name.toUpperCase()) || 
                loc.name.toUpperCase().includes(f.properties.nume.toUpperCase())
            );
            const p = station ? station.properties : null;

            document.getElementById('city-title').innerText = loc.name;
            document.getElementById('main-temp').innerText = (p ? parseFloat(p.tempe).toFixed(1) : cur.temp_c) + "°C";
            document.getElementById('main-desc').innerText = cur.condition.text;
            
            const sunTxt = isDay ? `Apusul este estimat la ora <strong>${timeFmt(fDay.astro.sunset)}</strong>.` : `Soarele va răsări la ora <strong>${timeFmt(fDay.astro.sunrise)}</strong>.`;
            document.getElementById('smart-text').innerHTML = `Starea vremii în <strong>${loc.name}</strong>: ${cur.condition.text.toLowerCase()} (${cur.cloud}% nori). Șanse ploaie: ${fDay.day.daily_chance_of_rain}%. ${sunTxt}`;

            const windMs = p ? parseFloat(p.vant.split(' ')[0]) : (cur.wind_kph/3.6).toFixed(1);
            const presMb = p ? parseFloat(p.presiunetext) : cur.pressure_mb;
            
            // Grid cu 8 câmpuri și eticheta METEOBLUE
            document.getElementById('full-grid').innerHTML = `
                <div><span class="item-label">Min / Max Azi</span><span class="item-val">${fDay.day.mintemp_c}°C / ${fDay.day.maxtemp_c}°C</span><span class="item-src">[WEATHERAPI]</span></div>
                <div><span class="item-label">La Noapte</span><span class="item-val">${fDay.hour[23].temp_c}°C</span><span class="item-src">[METEOBLUE]</span></div>
                <div><span class="item-label">Vânt Mediu</span><span class="item-val">${(windMs * 3.6).toFixed(1)} km/h (${windMs} m/s)</span><span class="item-src">[ANM]</span></div>
                <div><span class="item-label">Rafale & Dir</span><span class="item-val">${cur.gust_kph} km/h | ${p ? (p.vant.split(':')[1] || 'N') : cur.wind_dir}</span><span class="item-src">[W-API+ANM]</span></div>
                <div><span class="item-label">Presiune</span><span class="item-val">${presMb} mb (${Math.round(presMb*0.750062)} mmHg)</span><span class="item-src">[ANM]</span></div>
                <div><span class="item-label">Umiditate</span><span class="item-val">${p ? p.umezeala : cur.humidity}%</span><span class="item-src">[ANM]</span></div>
                <div><span class="item-label">Vizibilitate</span><span class="item-val">${cur.vis_km} km</span><span class="item-src">[WEATHERAPI]</span></div>
                <div><span class="item-label">Indice UV</span><span class="item-val">${fDay.day.uv}</span><span class="item-src">[WEATHERAPI]</span></div>
            `;

            const icons = { "senin": "fa-sun", "parțial": "fa-cloud-sun", "noros": "fa-cloud", "ploaie": "fa-cloud-rain", "acoperit": "fa-cloud" };
            const nightIcons = { "senin": "fa-moon", "parțial": "fa-cloud-moon" };
            
            let key = "noros";
            const d = cur.condition.text.toLowerCase();
            if(d.includes("senin") || d.includes("soare")) key = "senin";
            else if(d.includes("parțial")) key = "parțial";
            else if(d.includes("ploaie")) key = "ploaie";

            const iconClass = (isDay ? icons[key] : (nightIcons[key] || icons[key])) || "fa-cloud";
            const color = (!isDay && key==="senin") ? "#f1f5f9" : (key==="senin"||key==="parțial" ? "#f59e0b" : "#64748b");
            
            document.getElementById('big-icon').innerHTML = `<i class="fas ${iconClass}" style="color: ${color};"></i>`;
            document.getElementById('sync-info').innerText = p ? `Sincronizare ANM: ${p.actualizat.replace(/&nbsp;/g,' ')}` : "Sursă: WeatherAPI Global";

        } catch(e) { 
            alert("Eroare la preluarea datelor!");
        } finally {
            document.getElementById('loader').style.display = "none";
            document.getElementById('main-content').style.opacity = "1";
        }
    }

    updateWeather();
</script>
</body>
</html>
